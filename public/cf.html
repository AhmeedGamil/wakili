<head>

  <title>Wakili</title>
  <meta name="theme-color" content="#18181b">
  <link rel="manifest" href="/manifest-cf.json">
  <link rel="icon" type="image/png" href="/icons/icon-192.png">

  <!-- Cloudflare mode: swap EventSource for a WebSocket-backed shim BEFORE the app
       boots, so the live stream isn't buffered by Cloudflare. This classic script
       runs before the deferred module below. All existing app files are unchanged;
       this page just loads them with the shim in front. -->
  <script src="/cf-shim.js"></script>
</head>
<body data-theme="dark">
  <div id="app"></div>
  <script type="module" src="/js/main.js"></script>
  <script>
    if ("serviceWorker" in navigator) navigator.serviceWorker.register("/sw.js").catch(() => {});
  </script>
</body>
