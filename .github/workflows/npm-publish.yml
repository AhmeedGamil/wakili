# Publishes the gateway to npm every time a GitHub release is published.
#
# One-time setup (see README section in the repo or the PR that added this):
#   1. npmjs.com -> profile -> Access Tokens -> Generate New Token (Granular),
#      with "Read and write" permission scoped to the "wakili" package.
#   2. GitHub repo -> Settings -> Secrets and variables -> Actions ->
#      New repository secret, name: NPM_TOKEN, value: that token.
#
# The version published is whatever package.json says at the released tag —
# bump it before tagging or npm rejects the duplicate version.
name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance attestation
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
